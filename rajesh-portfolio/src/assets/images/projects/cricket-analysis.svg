<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <line x1="60" y1="60" x2="60" y2="380" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="380" x2="740" y2="380" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="300" x2="740" y2="300" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="220" x2="740" y2="220" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="140" x2="740" y2="140" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y-axis labels -->
  <text x="45" y="384" fill="#475569" font-size="11" text-anchor="end" font-family="monospace">0</text>
  <text x="45" y="304" fill="#475569" font-size="11" text-anchor="end" font-family="monospace">25</text>
  <text x="45" y="224" fill="#475569" font-size="11" text-anchor="end" font-family="monospace">50</text>
  <text x="45" y="144" fill="#475569" font-size="11" text-anchor="end" font-family="monospace">75</text>

  <!-- Batting Average Bars -->
  <rect x="90"  y="180" width="40" height="200" fill="url(#bar1)" rx="4" opacity="0.9" filter="url(#glow)"/>
  <rect x="190" y="200" width="40" height="180" fill="url(#bar1)" rx="4" opacity="0.9"/>
  <rect x="290" y="150" width="40" height="230" fill="url(#bar1)" rx="4" opacity="0.9"/>
  <rect x="390" y="170" width="40" height="210" fill="url(#bar1)" rx="4" opacity="0.9"/>
  <rect x="490" y="130" width="40" height="250" fill="url(#bar1)" rx="4" opacity="0.9" filter="url(#glow)"/>
  <rect x="590" y="160" width="40" height="220" fill="url(#bar1)" rx="4" opacity="0.9"/>
  <rect x="690" y="190" width="40" height="190" fill="url(#bar1)" rx="4" opacity="0.9"/>

  <!-- Strike Rate Bars (offset) -->
  <rect x="130" y="230" width="40" height="150" fill="url(#bar2)" rx="4" opacity="0.8"/>
  <rect x="230" y="250" width="40" height="130" fill="url(#bar2)" rx="4" opacity="0.8"/>
  <rect x="330" y="210" width="40" height="170" fill="url(#bar2)" rx="4" opacity="0.8"/>
  <rect x="430" y="240" width="40" height="140" fill="url(#bar2)" rx="4" opacity="0.8"/>
  <rect x="530" y="200" width="40" height="180" fill="url(#bar2)" rx="4" opacity="0.8"/>
  <rect x="630" y="220" width="40" height="160" fill="url(#bar2)" rx="4" opacity="0.8"/>

  <!-- Trend line -->
  <polyline points="110,175 210,195 310,145 410,165 510,125 610,155 710,185"
    fill="none" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Trend dots -->
  <circle cx="110" cy="175" r="4" fill="#14b8a6" filter="url(#glow)"/>
  <circle cx="210" cy="195" r="4" fill="#14b8a6"/>
  <circle cx="310" cy="145" r="4" fill="#14b8a6"/>
  <circle cx="410" cy="165" r="4" fill="#14b8a6"/>
  <circle cx="510" cy="125" r="5" fill="#14b8a6" filter="url(#glow)"/>
  <circle cx="610" cy="155" r="4" fill="#14b8a6"/>
  <circle cx="710" cy="185" r="4" fill="#14b8a6"/>

  <!-- Player name labels -->
  <text x="110"  y="400" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">Kohli</text>
  <text x="210"  y="400" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">Rohit</text>
  <text x="310"  y="400" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">Gill</text>
  <text x="410"  y="400" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">Iyer</text>
  <text x="510"  y="400" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">Pant</text>
  <text x="610"  y="400" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">Jadeja</text>
  <text x="710"  y="400" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">Bumrah</text>

  <!-- Legend -->
  <rect x="200" y="430" width="12" height="12" fill="#14b8a6" rx="2"/>
  <text x="218" y="441" fill="#94a3b8" font-size="12" font-family="sans-serif">Batting Average</text>
  <rect x="380" y="430" width="12" height="12" fill="#6366f1" rx="2"/>
  <text x="398" y="441" fill="#94a3b8" font-size="12" font-family="sans-serif">Strike Rate</text>
  <line x1="530" y1="436" x2="555" y2="436" stroke="#14b8a6" stroke-width="2.5"/>
  <circle cx="542" cy="436" r="3" fill="#14b8a6"/>
  <text x="560" y="441" fill="#94a3b8" font-size="12" font-family="sans-serif">Trend</text>

  <!-- Title -->
  <text x="400" y="35" fill="#e2e8f0" font-size="15" text-anchor="middle" font-family="sans-serif" font-weight="600" letter-spacing="1">CRICKET PLAYER PERFORMANCE ANALYSIS</text>
  <text x="400" y="52" fill="#14b8a6" font-size="11" text-anchor="middle" font-family="monospace">Cricbuzz Data · Python · Power BI</text>
</svg>
