<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="rev" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="ord" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)" rx="12"/>
  <!-- Title -->
  <text x="400" y="35" fill="#e2e8f0" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">Restaurant Operational System</text>
  <text x="400" y="52" fill="#f59e0b" font-size="11" text-anchor="middle" font-family="monospace">Python · Streamlit · Plotly · Real-Time Analytics</text>
  <!-- KPI Cards -->
  <rect x="40" y="70" width="160" height="80" fill="#111827" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="120" y="100" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="monospace">Total Revenue</text>
  <text x="120" y="128" fill="#f59e0b" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">₹84,200</text>
  <rect x="220" y="70" width="160" height="80" fill="#111827" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="300" y="100" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="monospace">Orders Today</text>
  <text x="300" y="128" fill="#14b8a6" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">342</text>
  <rect x="400" y="70" width="160" height="80" fill="#111827" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="480" y="100" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="monospace">Avg Order Value</text>
  <text x="480" y="128" fill="#a78bfa" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">₹246</text>
  <rect x="580" y="70" width="180" height="80" fill="#111827" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="670" y="100" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="monospace">Customer Rating</text>
  <text x="670" y="128" fill="#34d399" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">4.7 ★</text>
  <!-- Revenue line chart -->
  <rect x="40" y="170" width="460" height="200" fill="#111827" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="60" y="195" fill="#94a3b8" font-size="12" font-family="monospace">Hourly Revenue</text>
  <polyline points="70,330 130,300 190,310 250,270 310,280 350,240 390,255 430,220 470,235"
    fill="none" stroke="url(#rev)" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="70,330 130,300 190,310 250,270 310,280 350,240 390,255 430,220 470,235 470,350 70,350"
    fill="url(#rev)" opacity="0.08"/>
  <line x1="60" y1="350" x2="490" y2="350" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="210" x2="60" y2="350" stroke="#1e293b" stroke-width="1"/>
  <!-- Donut chart -->
  <rect x="520" y="170" width="240" height="200" fill="#111827" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="640" y="195" fill="#94a3b8" font-size="12" text-anchor="middle" font-family="monospace">Order Categories</text>
  <circle cx="640" cy="290" r="60" fill="none" stroke="#14b8a6" stroke-width="22" stroke-dasharray="150 228"/>
  <circle cx="640" cy="290" r="60" fill="none" stroke="#f59e0b" stroke-width="22" stroke-dasharray="90 288" stroke-dashoffset="-150"/>
  <circle cx="640" cy="290" r="60" fill="none" stroke="#a78bfa" stroke-width="22" stroke-dasharray="60 318" stroke-dashoffset="-240"/>
  <circle cx="640" cy="290" r="60" fill="none" stroke="#ef4444" stroke-width="22" stroke-dasharray="38 340" stroke-dashoffset="-300"/>
  <circle cx="640" cy="290" r="38" fill="#111827"/>
  <text x="640" y="286" fill="#e2e8f0" font-size="13" text-anchor="middle" font-family="monospace" font-weight="bold">342</text>
  <text x="640" y="300" fill="#64748b" font-size="9" text-anchor="middle" font-family="monospace">orders</text>
  <!-- Legend -->
  <rect x="40" y="385" width="10" height="10" fill="#14b8a6" rx="2"/>
  <text x="56" y="394" fill="#94a3b8" font-size="10" font-family="monospace">Dine-in 42%</text>
  <rect x="160" y="385" width="10" height="10" fill="#f59e0b" rx="2"/>
  <text x="176" y="394" fill="#94a3b8" font-size="10" font-family="monospace">Delivery 26%</text>
  <rect x="290" y="385" width="10" height="10" fill="#a78bfa" rx="2"/>
  <text x="306" y="394" fill="#94a3b8" font-size="10" font-family="monospace">Takeaway 18%</text>
  <rect x="430" y="385" width="10" height="10" fill="#ef4444" rx="2"/>
  <text x="446" y="394" fill="#94a3b8" font-size="10" font-family="monospace">Online 14%</text>
  <!-- Bar chart bottom -->
  <rect x="40" y="410" width="720" height="70" fill="#111827" rx="8" stroke="#1e293b" stroke-width="1"/>
  <text x="60" y="430" fill="#94a3b8" font-size="11" font-family="monospace">Top Items</text>
  <rect x="60"  y="438" width="80" height="28" fill="url(#ord)" rx="3" opacity="0.9"/>
  <rect x="160" y="438" width="65" height="28" fill="url(#ord)" rx="3" opacity="0.8"/>
  <rect x="245" y="438" width="95" height="28" fill="url(#ord)" rx="3" opacity="0.9"/>
  <rect x="360" y="438" width="50" height="28" fill="url(#ord)" rx="3" opacity="0.7"/>
  <rect x="430" y="438" width="72" height="28" fill="url(#ord)" rx="3" opacity="0.85"/>
  <text x="100"  y="457" fill="#fff" font-size="9" text-anchor="middle" font-family="monospace">Biryani</text>
  <text x="192"  y="457" fill="#fff" font-size="9" text-anchor="middle" font-family="monospace">Burger</text>
  <text x="292"  y="457" fill="#fff" font-size="9" text-anchor="middle" font-family="monospace">Pasta</text>
  <text x="385"  y="457" fill="#fff" font-size="9" text-anchor="middle" font-family="monospace">Pizza</text>
  <text x="466"  y="457" fill="#fff" font-size="9" text-anchor="middle" font-family="monospace">Salad</text>
</svg>
