<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <rect width="600" height="380" rx="12" fill="#0d1117"/>
  <!-- KPI cards -->
  <rect x="20" y="20" width="120" height="70" rx="8" fill="#0f2027"/>
  <text x="80" y="48" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">REVENUE</text>
  <text x="80" y="70" text-anchor="middle" fill="#14b8a6" font-size="20" font-family="monospace" font-weight="bold">₹84K</text>
  <rect x="155" y="20" width="120" height="70" rx="8" fill="#0f2027"/>
  <text x="215" y="48" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">ORDERS</text>
  <text x="215" y="70" text-anchor="middle" fill="#0ea5e9" font-size="20" font-family="monospace" font-weight="bold">1,240</text>
  <rect x="290" y="20" width="120" height="70" rx="8" fill="#0f2027"/>
  <text x="350" y="48" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">AVG ORDER</text>
  <text x="350" y="70" text-anchor="middle" fill="#f59e0b" font-size="20" font-family="monospace" font-weight="bold">₹67</text>
  <rect x="425" y="20" width="155" height="70" rx="8" fill="#0f2027"/>
  <text x="502" y="48" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">SATISFACTION</text>
  <text x="502" y="70" text-anchor="middle" fill="#a78bfa" font-size="20" font-family="monospace" font-weight="bold">4.7 ★</text>
  <!-- Area chart -->
  <rect x="20" y="105" width="370" height="180" rx="8" fill="#0f2027"/>
  <text x="205" y="125" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">Daily Revenue Trend</text>
  <polyline points="40,260 90,230 140,245 190,200 240,215 290,175 340,185 370,165" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <polygon points="40,260 90,230 140,245 190,200 240,215 290,175 340,185 370,165 370,270 40,270" fill="#14b8a6" opacity="0.1"/>
  <!-- Donut chart -->
  <rect x="405" y="105" width="175" height="180" rx="8" fill="#0f2027"/>
  <text x="492" y="125" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">Category Mix</text>
  <circle cx="492" cy="210" r="45" fill="none" stroke="#14b8a6" stroke-width="18" stroke-dasharray="85 197"/>
  <circle cx="492" cy="210" r="45" fill="none" stroke="#0ea5e9" stroke-width="18" stroke-dasharray="60 197" stroke-dashoffset="-85"/>
  <circle cx="492" cy="210" r="45" fill="none" stroke="#f59e0b" stroke-width="18" stroke-dasharray="52 197" stroke-dashoffset="-145"/>
  <text x="492" y="215" text-anchor="middle" fill="#e2e8f0" font-size="12" font-family="monospace">Mix</text>
  <!-- Bottom bar -->
  <rect x="20" y="298" width="560" height="62" rx="8" fill="#0f2027"/>
  <text x="300" y="335" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">ROS · Restaurant Operational System · Streamlit + Plotly</text>
